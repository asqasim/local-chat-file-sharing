<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LocalShare</title>

    <meta name="theme-color"
          content="#111111">

    <meta name="apple-mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <link rel="manifest"
          href="/manifest.json">

    <link rel="icon"
          href="/icons/favicon.ico">

    <!-- Inter Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div id="app">

    <!-- ===================================================== -->
    <!-- Sidebar -->
    <!-- ===================================================== -->

    <aside id="sidebar">

        <div class="sidebar-header">

            <button id="menu-button"
                    class="icon-button">

                <span class="material-symbols-rounded">
                    menu
                </span>

            </button>

            <h1>
                LocalShare
            </h1>

        </div>

        <nav class="sidebar-nav">

            <button class="nav-item active">

                <span class="material-symbols-rounded">
                    chat
                </span>

                <span>
                    Chat
                </span>

            </button>

            <button class="nav-item">

                <span class="material-symbols-rounded">
                    perm_media
                </span>

                <span>
                    Media
                </span>

            </button>

            <button class="nav-item">

                <span class="material-symbols-rounded">
                    devices
                </span>

                <span>
                    Devices
                </span>

            </button>

            <button class="nav-item">

                <span class="material-symbols-rounded">
                    qr_code_scanner
                </span>

                <span>
                    Pair Device
                </span>

            </button>

            <button class="nav-item">

                <span class="material-symbols-rounded">
                    settings
                </span>

                <span>
                    Settings
                </span>

            </button>

        </nav>

    </aside>

    <!-- ===================================================== -->
    <!-- Main -->
    <!-- ===================================================== -->

    <main id="main">

        <!-- Top Bar -->

        <header id="topbar">

            <div class="chat-device">

                <div class="device-avatar">

                    AS

                </div>

                <div>

                    <h2 id="device-name">

                        Ahmad's Galaxy

                    </h2>

                    <p id="device-status">

                        Online

                    </p>

                </div>

            </div>

            <div class="topbar-actions">

                <button class="icon-button">

                    <span class="material-symbols-rounded">
                        search
                    </span>

                </button>

                <button class="icon-button">

                    <span class="material-symbols-rounded">
                        more_vert
                    </span>

                </button>

            </div>

        </header>

        <!-- Messages -->

        <section id="chat-container">

            <div id="messages">

                <!-- JS -->

            </div>

        </section>

        <!-- Composer -->

        <footer id="composer">

            <button id="attach-button"
                    class="icon-button">

                <span class="material-symbols-rounded">
                    attach_file
                </span>

            </button>

            <textarea
                id="message-input"
                placeholder="Type a message..."
                rows="1"></textarea>

            <button id="send-button">

                <span class="material-symbols-rounded">
                    send
                </span>

            </button>

        </footer>

    </main>

    <!-- ===================================================== -->
    <!-- Right Panel -->
    <!-- ===================================================== -->

    <aside id="details-panel">

        <div class="panel-header">

            <h2>

                Device Details

            </h2>

        </div>

        <div class="device-card">

            <div class="device-ring">

                AS

            </div>

            <h3>

                Ahmad's Galaxy

            </h3>

            <p>

                Android

            </p>

        </div>

        <div id="device-information">

            <!-- JS -->

        </div>

    </aside>

</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/socket.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
