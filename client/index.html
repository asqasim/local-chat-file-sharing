<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Local Chat File Sharing</title>



    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#181b22">
    
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app">

        <header class="topbar">

            <div class="device">

                <img src="assets/avatars/windows.png" alt="Windows PC" class="avatar">

                <div class="device-info">
                    <h1>Shop PC</h1>
                    <p id="connection-status">
                        Connecting...
                    </p>
                </div>

            </div>

        </header>


        <main id="chat" class="chat">

            <!-- Messages appear here -->

        </main>


        <footer class="composer">

            <button id="attach-button" class="icon-button" type="button" title="Attach">

                +

            </button>

            <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off">

            <button id="send-button" class="send-button" type="button">

                Send

            </button>

        </footer>

    </div>

    <input id="file-input" type="file" hidden multiple>

    <script src="js/app.js"></script>

</body>

</html>
