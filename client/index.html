<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="theme-color"
        content="#111111">

    <meta
        name="description"
        content="Offline-first local messaging and file sharing.">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <title>LocalShare</title>

    <link
        rel="manifest"
        href="/manifest.json">

    <link
        rel="icon"
        href="/icons/favicon.ico">

    <!-- Google Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Material Symbols Rounded -->

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div id="app">

    <!-- ===================================================== -->
    <!-- Mobile Drawer Backdrop -->
    <!-- ===================================================== -->

    <div id="drawer-backdrop"></div>

    <!-- ===================================================== -->
    <!-- Mobile Drawer -->
    <!-- ===================================================== -->

    <aside id="mobile-drawer">

        <header class="drawer-header">

            <div class="drawer-brand">

                <div class="brand-logo">

                    LS

                </div>

                <div>

                    <h2>LocalShare</h2>

                    <small>Offline First</small>

                </div>

            </div>

            <button
                id="drawer-close"
                class="icon-button">

                <span class="material-symbols-rounded">
                    close
                </span>

            </button>

        </header>

        <nav class="drawer-nav">

            <button class="drawer-item active">

                <span class="material-symbols-rounded">
                    chat
                </span>

                Chat

            </button>

            <button class="drawer-item">

                <span class="material-symbols-rounded">
                    perm_media
                </span>

                Media

            </button>

            <button class="drawer-item">

                <span class="material-symbols-rounded">
                    devices
                </span>

                Devices

            </button>

            <button class="drawer-item">

                <span class="material-symbols-rounded">
                    qr_code_scanner
                </span>

                Pair Device

            </button>

            <button class="drawer-item">

                <span class="material-symbols-rounded">
                    settings
                </span>

                Settings

            </button>

        </nav>

    </aside>

    <!-- ===================================================== -->
    <!-- Desktop Sidebar -->
    <!-- ===================================================== -->

    <aside id="sidebar">

        <header id="sidebar-header">

            <div class="brand">

                <div class="brand-logo">

                    LS

                </div>

                <div>

                    <h1>

                        LocalShare

                    </h1>

                    <small>

                        Offline First

                    </small>

                </div>

            </div>

        </header>

        <nav id="sidebar-navigation">

            <button class="sidebar-item active">

                <span class="material-symbols-rounded">
                    chat
                </span>

                <span>

                    Chats

                </span>

            </button>

            <button class="sidebar-item">

                <span class="material-symbols-rounded">
                    perm_media
                </span>

                <span>

                    Media

                </span>

            </button>

            <button class="sidebar-item">

                <span class="material-symbols-rounded">
                    devices
                </span>

                <span>

                    Devices

                </span>

            </button>

            <button class="sidebar-item">

                <span class="material-symbols-rounded">
                    qr_code_scanner
                </span>

                <span>

                    Pair Device

                </span>

            </button>

            <button class="sidebar-item">

                <span class="material-symbols-rounded">
                    settings
                </span>

                <span>

                    Settings

                </span>

            </button>

        </nav>

    </aside>

    <!-- ===================================================== -->
    <!-- Main -->
    <!-- ===================================================== -->

    <main id="main">

        <!-- ============================================== -->
        <!-- Top Bar -->
        <!-- ============================================== -->

        <header id="topbar">

            <div class="topbar-left">

                <button
                    id="mobile-menu-button"
                    class="icon-button">

                    <span class="material-symbols-rounded">

                        menu

                    </span>

                </button>

                <div
                    id="active-device-avatar"
                    class="device-avatar">

                    AS

                </div>

                <div>

                    <h2 id="active-device-name">

                        Ahmad's Galaxy

                    </h2>

                    <p id="active-device-status">

                        ● Online

                    </p>

                </div>

            </div>

            <div class="topbar-right">

                <button
                    id="search-button"
                    class="icon-button">

                    <span class="material-symbols-rounded">

                        search

                    </span>

                </button>

                <button
                    id="more-button"
                    class="icon-button">

                    <span class="material-symbols-rounded">

                        more_vert

                    </span>

                </button>

            </div>

        </header>

        <!-- ============================================== -->
        <!-- Chat Background -->
        <!-- ============================================== -->

        <section id="chat-container">

            <div id="messages">

                <!-- Messages inserted here -->

            </div>

        </section>

        <!-- ============================================== -->
        <!-- Composer -->
        <!-- ============================================== -->

        <footer id="composer">

            <button
                id="attachment-button"
                class="icon-button">

                <span class="material-symbols-rounded">

                    attach_file

                </span>

            </button>

            <textarea
                id="message-input"
                rows="1"
                placeholder="Type a message..."></textarea>

            <button
                id="send-button">

                <span class="material-symbols-rounded">

                    send

                </span>

            </button>

        </footer>

    </main>

    <!-- ===================================================== -->
    <!-- Right Panel -->
    <!-- ===================================================== -->

    <aside id="details-panel">

        <header class="panel-header">

            <h2>

                Device

            </h2>

        </header>

        <div class="device-profile">

            <div
                id="profile-avatar"
                class="device-avatar large">

                AS

            </div>

            <h3>

                Ahmad's Galaxy

            </h3>

            <p>

                Android 16

            </p>

        </div>

        <section id="device-information">

            <!-- Filled by JS -->

        </section>

        <section id="quick-actions">

            <button class="panel-button">

                <span class="material-symbols-rounded">

                    folder

                </span>

                Shared Files

            </button>

            <button class="panel-button">

                <span class="material-symbols-rounded">

                    image

                </span>

                Images

            </button>

            <button class="panel-button">

                <span class="material-symbols-rounded">

                    movie

                </span>

                Videos

            </button>

            <button class="panel-button">

                <span class="material-symbols-rounded">

                    description

                </span>

                Documents

            </button>

        </section>

    </aside>

</div>

<!-- ========================= -->
