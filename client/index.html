<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Local Chat File Sharing</title>

    <meta name="theme-color" content="#ffffff">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.ico">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div id="app">

    <!-- ================= Sidebar (Desktop) ================= -->

    <aside id="sidebar">

        <div class="sidebar-header">

            <div class="app-logo">
                LS
            </div>

            <div>

                <h1>LocalShare</h1>

                <p>LAN Messenger</p>

            </div>

        </div>

        <nav class="sidebar-nav">

            <button class="nav-button active"
                    data-page="chat">

                💬

                <span>Chat</span>

            </button>

            <button class="nav-button"
                    data-page="files">

                📁

                <span>Files</span>

            </button>

            <button class="nav-button"
                    data-page="media">

                🖼

                <span>Media</span>

            </button>

            <button class="nav-button"
                    data-page="devices">

                💻

                <span>Devices</span>

            </button>

            <button class="nav-button"
                    data-page="settings">

                ⚙

                <span>Settings</span>

            </button>

        </nav>

        <div class="sidebar-footer">

            <div class="device-avatar">

                PC

            </div>

            <div>

                <strong>Windows PC</strong>

                <small id="connection-status">
                    Connecting...
                </small>

            </div>

        </div>

    </aside>

    <!-- ================= Main ================= -->

    <main id="main-content">

        <!-- Top Bar -->

        <header id="topbar">

            <div>

                <h2 id="page-title">

                    Chat

                </h2>

                <small id="page-subtitle">

                    Local Wi-Fi Messaging

                </small>

            </div>

            <button id="pair-button">

                Pair Device

            </button>

        </header>

        <!-- ================= Chat ================= -->

        <section
                id="chat-page"
                class="page active-page">

            <div id="chat">

            </div>

            <footer id="composer">

                <button
                        id="attach-button"
                        type="button">

                    📎

                </button>

                <input
                        id="message-input"
                        autocomplete="off"
                        placeholder="Type a message...">

                <button
                        id="send-button"
                        type="button">

                    ➤

                </button>

                <input
                        id="file-input"
                        hidden
                        type="file">

            </footer>

        </section>

        <!-- ================= Files ================= -->

        <section
                id="files-page"
                class="page">

            <div class="page-header">

                <h2>Files</h2>

                <input
                        type="search"
                        placeholder="Search files...">

            </div>

            <div class="placeholder">

                <h3>No files yet</h3>

                <p>Shared files will appear here.</p>

            </div>

        </section>

        <!-- ================= Media ================= -->

        <section
                id="media-page"
                class="page">

            <div class="page-header">

                <h2>Media</h2>

            </div>

            <div class="placeholder">

                <h3>No media</h3>

                <p>Images and videos will be shown here.</p>

            </div>

        </section>

        <!-- ================= Devices ================= -->

        <section
                id="devices-page"
                class="page">

            <div class="page-header">

                <h2>Devices</h2>

            </div>

            <div id="device-list">

            </div>

            <button id="add-device-button">

                + Pair New Device

            </button>

        </section>

        <!-- ================= Settings ================= -->

        <section
                id="settings-page"
                class="page">

            <div class="page-header">

                <h2>Settings</h2>

            </div>

            <div class="placeholder">

                <p>Appearance</p>

                <p>Downloads</p>

                <p>Network</p>

                <p>Storage</p>

                <p>Security</p>

            </div>

        </section>

    </main>

</div>

<!-- ================= Mobile Navigation ================= -->

<nav id="mobile-nav">

    <button data-page="chat">💬</button>

    <button data-page="files">📁</button>

    <button data-page="media">🖼</button>

    <button data-page="devices">💻</button>

    <button data-page="settings">⚙</button>

</nav>

<!-- ================= Overlay ================= -->

<div id="modal-root"></div>

<div id="toast-root"></div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/socket.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/app.js"></script>

</body>

</html>
